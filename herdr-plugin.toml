id = "nathanflurry.jj-workspace"
name = "jj workspaces"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Create and remove Jujutsu (jj) workspaces as Herdr workspaces."
platforms = ["linux", "macos"]

# Bindable action -> resolves the focused repo, then opens the create pane.
# Actions run headless (no TTY), so the name prompt has to live in a pane.
[[actions]]
id = "new"
title = "New jj workspace"
contexts = ["workspace", "global"]
command = ["bash", "open-new.sh"]

# The pane the action opens: a real terminal, so it can prompt for a name.
[[panes]]
id = "new"
title = "New jj workspace"
placement = "overlay"
command = ["bash", "new-pane.sh"]

# Teardown: no prompt needed, so a plain headless action.
[[actions]]
id = "remove"
title = "Remove jj workspace"
contexts = ["workspace"]
command = ["bash", "remove.sh"]
